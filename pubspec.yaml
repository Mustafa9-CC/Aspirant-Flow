name: aspirant_flow
description: A minimalistic productivity app for NEET/JEE aspirants.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  audioplayers: ^6.0.0
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0
  font_awesome_flutter: ^10.7.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  provider: ^6.1.2
  intl: ^0.19.0
  flutter_foreground_task: ^8.8.0
  file_picker: ^10.3.8
  open_filex: ^4.7.0
  uuid: ^4.5.2
  path: ^1.9.1
  syncfusion_flutter_pdfviewer: ^32.1.21
  sqflite: 2.3.3+1
  image_picker: ^1.1.2
  record: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  sqflite_common_ffi: 2.3.0+1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/icons/
    - assets/json/
